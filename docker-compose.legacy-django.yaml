services:
    legacy-django:
        container_name: legacy-django
        build:
            context: .
            dockerfile: backend/dockerfile.legacy-django
            args:
                LEGACY_DJANGO_REF: ${LEGACY_DJANGO_REF:-3a9f9076130c97e202a0b8dad634540eb584e72b}
        ports:
            - 3001:8000
        env_file: ./.env
        environment:
            - BACKEND_SERVER=${VITE_BACKEND_URL}
            - BACKEND_PREFIX=${BACKEND_PREFIX}
            - DEBUG=${DJANGO_DEBUG}
            - SECRET_KEY=${SECRET_KEY}
            - DB_NAME=${DB_NAME}
            - DB_USER=${DB_USER}
            - DB_PASSWORD=${DB_PASSWORD}
            - DB_HOST=${DB_HOST}
            - DB_PORT=${DB_PORT}
            - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS}
            - TOKEN=${TOKEN}
            - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
            - REDIS_PASS=${REDIS_PASS}
            - SUPER_USER_NAME=${SUPER_USER_NAME}
            - SUPER_USER_EMAIL=${SUPER_USER_EMAIL}
            - SUPER_USER_PASSWORD=${SUPER_USER_PASSWORD}
        volumes:
            - ./backend/media:/backend/media:ro
        depends_on:
            - db
            - redis
        command: sh ./run-server.sh
