services:
    backend:
        container_name: backend
        build:
            context: ./backend
            dockerfile: dockerfile.prod
        volumes:
            - ./backend:/backend
        expose:
            - 8000
        env_file: ./.env
        environment:
            - BACKEND_SERVER=${VITE_BACKEND_URL}
            - BACKEND_PREFIX=${BACKEND_PREFIX}
            - DEBUG=${DJANGO_DEBUG:?Variable DJANGO_DEBUG required}
            - SECRET_KEY=${SECRET_KEY}
            - DB_NAME=${DB_NAME}
            - DB_USER=${DB_USER}
            - DB_PASSWORD=${DB_PASSWORD}
            - DB_HOST=${DB_HOST}
            - DB_PORT=${DB_PORT}
            - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS}
        depends_on:
            - db
        command: sh ./run-server.prod.sh

    db:
        container_name: postgres-db
        image: postgres:15-alpine
        restart: always
        volumes: 
            - db-data:/var/lib/postgresql/data
        env_file: ./.env
        environment:
            - POSTGRES_DB=${DB_NAME}
            - POSTGRES_USER=${DB_USER}
            - POSTGRES_PASSWORD=${DB_PASSWORD}
        expose:
            - 5433
        healthcheck:
            test: ["CMD", "-f", "http://localhost:5433"]

    info-service:
        container_name: info-service
        image: swaggerapi/swagger-ui
        expose:
            - 8080
        volumes:
            - ./info-service/swagger.yaml:/spec/swagger.yaml
        environment:
            SWAGGER_JSON: /spec/swagger.yaml

    bot:
        container_name: bot
        build:
            context: ./bot
        restart: unless-stopped
        volumes:
            - ./bot:/bot
        env_file: ./.env
        environment:
            - TOKEN=${TOKEN}
            - WEB_APP_URL=${WEB_APP_URL}
        command: sh -c "python bot.py"

    nginx: 
        container_name: nginx-server
        build:
            context: ./tg-frontend
            dockerfile: dockerfile.prod
            args:
                - BACKEND_URL=${VITE_BACKEND_URL}
        restart: unless-stopped
        env_file: ./.env
        environment:
            - VITE_BACKEND_URL=${VITE_BACKEND_URL}
        volumes:
            - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
            # Created by certbot in server
            - /etc/letsencrypt/ssl/fullchain.pem:/etc/nginx/ssl/fullchain.pem
            - /etc/letsencrypt/ssl/privkey.pem:/etc/nginx/ssl/privkey.pem
        depends_on: 
            - backend
            - info-service
        ports:
            - 443:443
            - 80:80
        command: ["nginx", "-g", "daemon off;"]

volumes: 
    db-data:
        name: cs-lineups-db
