services:
    backend:
        container_name: backend
        build:
            context: ./backend
            dockerfile: dockerfile.prod
        volumes:
            - ./backend:/backend
            - ./backend:/static
            - media:/backend/media
        expose:
            - 8000
        env_file: ./.env
        environment:
            - BACKEND_SERVER=${VITE_BACKEND_URL}
            - BACKEND_PREFIX=${BACKEND_PREFIX}
            - DEBUG=${DJANGO_DEBUG:?Variable DJANGO_DEBUG required}
            - SECRET_KEY=${SECRET_KEY}
            - DB_NAME=${DB_NAME}
            - DB_USER=${DB_USER}
            - DB_PASSWORD=${DB_PASSWORD}
            - DB_HOST=${DB_HOST}
            - DB_PORT=${DB_PORT}
            - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS}
            - REDIS_PASS=${REDIS_PASS}
            - SUPER_USER_NAME=${SUPER_USER_NAME}
            - SUPER_USER_EMAIL=${SUPER_USER_EMAIL}
            - SUPER_USER_PASSWORD=${SUPER_USER_PASSWORD}
        depends_on:
            - db
        command: sh ./run-server.prod.sh

    db:
        container_name: postgres-db
        image: postgres:15-alpine
        restart: always
        volumes: 
            - db-data:/var/lib/postgresql/data
        env_file: ./.env
        environment:
            - POSTGRES_DB=${DB_NAME}
            - POSTGRES_USER=${DB_USER}
            - POSTGRES_PASSWORD=${DB_PASSWORD}
        expose:
            - 5433
        healthcheck:
            test: ["CMD", "-f", "http://localhost:5433"]
    
    redis:
        container_name: redis_db
        image: redis:alpine
        restart: always
        volumes: 
            - cache-data:/var/lib/redis/data
        env_file: ./.env
        environment:
        - REDIS_PASSWORD=${REDIS_PASS}
        ports:
        - 6379:6379
        command: redis-server --requirepass ${REDIS_PASS}
        healthcheck:
            test: ["CMD", "redis-cli", "-a", "${REDIS_PASS}", "ping"]
            interval: 5s
            timeout: 30s
            retries: 3

    info-service:
        container_name: info-service
        image: swaggerapi/swagger-ui
        expose:
            - 8080
        volumes:
            - ./info-service/swagger.yaml:/spec/swagger.yaml
        environment:
            SWAGGER_JSON: /spec/swagger.yaml

    bot:
        container_name: bot
        build:
            context: ./bot
        restart: unless-stopped
        volumes:
            - ./bot:/bot
        env_file: ./.env
        environment:
            - TOKEN=${TOKEN}
            - WEB_APP_URL=${WEB_APP_URL}
        command: sh -c "python bot.py"

    nginx: 
        container_name: nginx-server
        build:
            context: ./tg-frontend
            dockerfile: dockerfile.prod
            args:
                - BACKEND_URL=${VITE_BACKEND_URL}
        restart: unless-stopped
        env_file: ./.env
        environment:
            - VITE_BACKEND_URL=${VITE_BACKEND_URL}
        volumes:
            - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
            # Created by certbot in server
            - /etc/letsencrypt/ssl/fullchain.pem:/etc/nginx/ssl/fullchain.pem
            - /etc/letsencrypt/ssl/privkey.pem:/etc/nginx/ssl/privkey.pem
        depends_on: 
            - backend
            - info-service
        ports:
            - 443:443
            - 80:80
        command: ["nginx", "-g", "daemon off;"]

volumes: 
    db-data:
        name: cs-lineups-db
    cache-data:
        name: cs-lineups-redis
    media: 
        name: media
