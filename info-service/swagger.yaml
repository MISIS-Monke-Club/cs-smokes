openapi: 3.0.3
info:
  title: API for Maps, Lineups, and Users Management
  version: 1.0.0
  description: API for managing maps, lineups, grenade classes, users, admins, and favorites in a tactical game.
servers:
  - url: "http://localhost:3000/api/"
    description: Сервер бекенда

tags:
  - name: AUTH
    description: Авторизация
  - name: Maps
    description: Карты
  - name: Lineups
    description: Раскидки
  - name: LineupTypes
    description: Типы раскидок
  - name: GrenadeClasses
    description: Классы гранат
  - name: Users
    description: Пользователи
  - name: Admins
    description: Администраторы
  - name: Favorites
    description: Избранное

paths:
  /login:
    post:
      tags:
        - AUTH
      summary: Логин
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: Успешный логин
          content:
            application/json:
              schema:
                type: object
                properties:
                  user_id: 
                    type: int
                  auth_token:
                    type: string
                  refresh_token:
                    type: string
        "401":
          description: Неправильный логин или пароль

  /login/tg:
    post:
      tags:
        - AUTH
      summary: Логин через тг
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                init_data:
                  type: string
      responses:
        "200":
          description: Успешный логин
          content:
            application/json:
              schema:
                type: object
                properties:
                  user_id:
                    type: int
                  auth_token:
                    type: string
                  refresh_token:
                    type: string
        "401":
          description: Что-то пошло не так, попробуйте перезайти
  /register:
    post:
      tags:
        - AUTH
      summary: Регистрация
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                password:
                  type: string
                email:
                  type: string
                first_name:
                  type: string
                last_name:
                  type: string
      responses:
        "201":
          description: Успешная регистрация
        "400":
          description: Неправильные данные

  /maps:
    get:
      tags:
        - Maps
      summary: Получить все карты
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Список всех карт
          content:
            application/json:
              schema:
                type: object
                properties:
                  map_id:
                    type: integer
                  name:
                    type: string
                  link:
                    type: string
                  image_link:
                    type: string
    post:
      tags:
        - Maps
      summary: Создать новую карту
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                link:
                  type: string
                image_link:
                  type: string
      responses:
        "201":
          description: Карта успешно создана
        "401":
          description: Неавторизованный доступ

  /maps/{id}:
    get:
      tags:
        - Maps
      summary: Получить карту по ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Информация о карте
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Map"
    put:
      tags:
        - Maps
      summary: Полностью обновить карту по ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                link:
                  type: string
                image_link:
                  type: string
      responses:
        "200":
          description: Карта успешно обновлена
        "401":
          description: Неавторизованный доступ
    patch:
      tags:
        - Maps
      summary: Частично обновить карту по ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                link:
                  type: string
                image_link:
                  type: string
      responses:
        "200":
          description: Карта частично обновлена
        "401":
          description: Неавторизованный доступ
    delete:
      tags:
        - Maps
      summary: Удалить карту по ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Карта успешно удалена
        "401":
          description: Неавторизованный доступ

  /lineups:
    get:
      tags:
        - Lineups
      summary: Получить все раскидки
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Список всех раскидок
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Lineup"
    post:
      tags:
        - Lineups
      summary: Создать новую раскидку
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                map_id:
                  type: integer
                link_to_video:
                  type: string
                user_id:
                  type: integer
                title:
                  type: string
                description:
                  type: string
                approved:
                  type: boolean
                views:
                  type: integer
                preview_image_link:
                  type: string
                property:
                  type: object
                  properties:
                    info_about:
                      type: string
                    info_value:
                      type: string
                  grenade_class:
                    type: object
                    properties:
                      greande_info:
                        type: string
      responses:
        "201":
          description: Раскидка успешно создана
        "401":
          description: Неавторизованный доступ

  /lineups/{id}:
    get:
      tags:
        - Lineups
      summary: Получить раскидку по ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Информация о раскидке
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lineup"
    put:
      tags:
        - Lineups
      summary: Полностью обновить раскидку по ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                map_id:
                  type: integer
                grenade_class_id:
                  type: integer
                type_id:
                  type: integer
                link_to_video:
                  type: string
                user_id:
                  type: integer
                title:
                  type: string
                description:
                  type: string
                approved:
                  type: boolean
                views:
                  type: integer
                preview_image_link:
                  type: string
                property:
                  type: object
                  properties:
                    info_about:
                      type: string
                    info_value:
                      type: string
              grenade_class:
                type: object
                properties:
                  greande_info:
                    type: string

      responses:
        "200":
          description: Раскидка успешно обновлена
        "401":
          description: Неавторизованный доступ
    patch:
      tags:
        - Lineups
      summary: Частично обновить раскидку по ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                map_id:
                  type: integer
                grenade_class_id:
                  type: integer
                type_id:
                  type: integer
                link_to_video:
                  type: string
                user_id:
                  type: integer
                title:
                  type: string
                description:
                  type: string
                approved:
                  type: boolean
                views:
                  type: integer
                preview_image_link:
                  type: string
                property:
                  type: object
                  properties:
                    info_about:
                      type: string
                    info_value:
                      type: string
              grenade_class:
                type: object
                properties:
                  greande_info:
                    type: string

      responses:
        "200":
          description: Раскидка частично обновлена
        "401":
          description: Неавторизованный доступ
    delete:
      tags:
        - Lineups
      summary: Удалить раскидку по ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Раскидка успешно удалена
        "401":
          description: Неавторизованный доступ

  

  /grenade-classes:
    get:
      tags:
        - GrenadeClasses
      summary: Получить все классы гранат
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Список всех классов гранат
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GrenadeClass"
    post:
      tags:
        - GrenadeClasses
      summary: Создать новый класс гранаты
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
      responses:
        "201":
          description: Класс гранаты успешно создан
        "401":
          description: Неавторизованный доступ

  /users:
    get:
      tags:
        - Users
      summary: Получить данные всех пользователей
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Список всех пользователей (только id и username)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      tags:
        - Users
      summary: Создать нового пользователя
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                avatar_url:
                  type: string
                steam_link:
                  type: string
                tg_id:
                  type: integer
                email:
                  type: string
                first_name:
                  type: string
                last_name:
                  type: string
                is_banned:
                  type: boolean
      responses:
        "201":
          description: Пользователь успешно создан
        "401":
          description: Неавторизованный доступ

  /users/{id}:
    get:
      tags:
        - Users
      summary: Получить данные пользователя по ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Информация о пользователе
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    put:
      tags:
        - Users
      summary: Полностью обновить пользователя по ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                avatar_url:
                  type: string
                steam_link:
                  type: string
                tg_id:
                  type: integer
                email:
                  type: string
                first_name:
                  type: string
                last_name:
                  type: string
                is_banned:
                  type: boolean
      responses:
        "200":
          description: Пользователь успешно обновлен
        "401":
          description: Неавторизованный доступ
    patch:
      tags:
        - Users
      summary: Частично обновить пользователя по ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                avatar_url:
                  type: string
                steam_link:
                  type: string
                tg_id:
                  type: integer
                email:
                  type: string
                first_name:
                  type: string
                last_name:
                  type: string
                is_banned:
                  type: boolean
      responses:
        "200":
          description: Пользователь частично обновлен
        "401":
          description: Неавторизованный доступ
    delete:
      tags:
        - Users
      summary: Удалить пользователя по ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Пользователь успешно удален
        "401":
          description: Неавторизованный доступ

  /admins:
    get:
      tags:
        - Admins
      summary: Получить всех администраторов
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Список всех администраторов
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Admins"
    post:
      tags:
        - Admins
      summary: Назначить администратора
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                user_id:
                  type: integer
                admin_type_id:
                  type: integer
      responses:
        "201":
          description: Администратор успешно назначен
        "401":
          description: Неавторизованный доступ

  /admins/{id}:
    get:
      tags:
        - Admins
      summary: Получить администратора по ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Информация об администраторе
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Admins"
    patch:
      tags:
        - Admins
      summary: Частично обновить администратора по ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                admin_type_id:
                  type: integer
      responses:
        "200":
          description: Администратор частично обновлен
        "401":
          description: Неавторизованный доступ
    delete:
      tags:
        - Admins
      summary: Удалить администратора по ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Администратор успешно удален
        "401":
          description: Неавторизованный доступ

  /admin-types:
    get:
      tags:
        - Admins
      summary: Получить все типы администраторов
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Список всех типов администраторов
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminType"
    post:
      tags:
        - Admins
      summary: Создать новый тип администратора
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                is_superuser:
                  type: boolean
                is_base_admin:
                  type: boolean
                is_editor:
                  type: boolean
      responses:
        "201":
          description: Тип администратора успешно создан
        "401":
          description: Неавторизованный доступ

  /admin-types/{id}:
    get:
      tags:
        - Admins
      summary: Получить тип администратора по ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Информация о типе администратора
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminType"
    put:
      tags:
        - Admins
      summary: Полностью обновить тип администратора по ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                is_superuser:
                  type: boolean
                is_base_admin:
                  type: boolean
                is_editor:
                  type: boolean
      responses:
        "200":
          description: Тип администратора успешно обновлен
        "401":
          description: Неавторизованный доступ
    patch:
      tags:
        - Admins
      summary: Частично обновить тип администратора по ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                is_superuser:
                  type: boolean
                is_base_admin:
                  type: boolean
                is_editor:
                  type: boolean
      responses:
        "200":
          description: Тип администратора частично обновлен
        "401":
          description: Неавторизованный доступ
    delete:
      tags:
        - Admins
      summary: Удалить тип администратора по ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Тип администратора успешно удален
        "401":
          description: Неавторизованный доступ

  /favorites:
    get:
      tags:
        - Favorites
      summary: Получить все избранные раскидки
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Список всех избранных раскидок
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Favorites"
    post:
      tags:
        - Favorites
      summary: Добавить раскидку в избранное
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                grenade_id:
                  type: integer
      responses:
        "201":
          description: Раскидка успешно добавлена в избранное
        "401":
          description: Неавторизованный доступ

  /favorites/{userId}:
    get:
      tags:
        - Favorites
      summary: Получить избранные раскидки пользователя
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Список избранных раскидок пользователя
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Favorites"

  /favorites/{userId}/{grenadeId}:
    delete:
      tags:
        - Favorites
      summary: Удалить раскидку из избранного
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
        - name: grenadeId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Раскидка успешно удалена из избранного
        "401":
          description: Неавторизованный доступ

components:
  schemas:
    Map:
      type: object
      properties:
        map_id:
          type: integer
        name:
          type: string
        link:
          type: string
        image_link:
          type: string
        map_lineups:
          type: array
          items:
            $ref: "#/components/schemas/Lineup"

    Lineup:
      type: object
      properties:
        grenade_id:
          type: integer
        map_id:
          type: integer
        type_id:
          type: integer
        link_to_video:
          type: string
        user_id:
          type: integer
        created_at:
          type: string
          format: date-time
        title:
          type: string
        description:
          type: string
        is_approved:
          type: boolean
        views:
          type: integer
        preview_image_link:
          type: string
        property:
          type: array
          items:
            properties:
              key:
                type: string
              value:
                type: string
        grenade_class:
          type: object
          properties:
            name:
              type: string
            description:
              type: string
            price:
              type: int

    LineupType:
      type: object
      properties:
        type_id:
          type: integer
        key_name:
          type: string
        value_id:
          type: integer

    GrenadeClass:
      type: object
      properties:
        grenade_class_id:
          type: integer
        name:
          type: string

    User:
      type: object
      properties:
        user_id:
          type: integer
        username:
          type: string
        avatar_url:
          type: string
        steam_link:
          type: string
        tg_id:
          type: integer
        email:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        is_banned:
          type: boolean

    Admins:
      type: object
      properties:
        user_info:
          type: object
          properties:
            user_id:
              type: integer
            username:
              type: string
            avatar_url:
              type: string
            tg_id:
              type: integer
            email:
              type: string
            first_name:
              type: string
            last_name:
              type: string
            is_banned:
              type: boolean
        admine_info:
          type: object
          properties:
            admin_type_id:
              type: integer
            is_superuser:
              type: boolean
