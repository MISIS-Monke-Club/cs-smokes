openapi: 3.0.3
info:
  title: API for Maps, Lineups, and Users Management
  version: 1.0.0
  description: API for managing maps, lineups, grenade classes, users, admins, and favorites in a tactical game.
servers:
  - url: 'http://localhost:3000/'
    description: Сервер бекенда

paths:
  /maps:
    get:
      summary: Получить все карты
      responses:
        '200':
          description: Список всех карт
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Map'
    post:
      summary: Создать новую карту
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Map'
      responses:
        '201':
          description: Карта успешно создана

  /maps/{id}:
    get:
      summary: Получить карту по ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Информация о карте
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Map'
    put:
      summary: Полностью обновить карту по ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Map'
      responses:
        '200':
          description: Карта успешно обновлена
    patch:
      summary: Частично обновить карту по ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MapUpdate'
      responses:
        '200':
          description: Карта частично обновлена
    delete:
      summary: Удалить карту по ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Карта успешно удалена

  /lineups:
    get:
      summary: Получить все раскидки
      responses:
        '200':
          description: Список всех раскидок
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Lineup'
    post:
      summary: Создать новую раскидку
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Lineup'
      responses:
        '201':
          description: Раскидка успешно создана

  /lineups/{id}:
    get:
      summary: Получить раскидку по ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Информация о раскидке
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Lineup'
    put:
      summary: Полностью обновить раскидку по ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Lineup'
      responses:
        '200':
          description: Раскидка успешно обновлена
    patch:
      summary: Частично обновить раскидку по ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LineupUpdate'
      responses:
        '200':
          description: Раскидка частично обновлена
    delete:
      summary: Удалить раскидку по ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Раскидка успешно удалена

  /lineup-types:
    get:
      summary: Получить все типы раскидок
      responses:
        '200':
          description: Список всех типов раскидок
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LineupType'
    post:
      summary: Создать новый тип раскидки
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LineupType'
      responses:
        '201':
          description: Тип раскидки успешно создан

  /lineup-types/{id}:
    get:
      summary: Получить тип раскидки по ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Информация о типе раскидки
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LineupType'
    put:
      summary: Полностью обновить тип раскидки по ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LineupType'
      responses:
        '200':
          description: Тип раскидки успешно обновлен
    patch:
      summary: Частично обновить тип раскидки по ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LineupTypeUpdate'
      responses:
        '200':
          description: Тип раскидки частично обновлен
    delete:
      summary: Удалить тип раскидки по ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Тип раскидки успешно удален

  /lineup-type-values:
    get:
      summary: Получить все значения типов раскидок
      responses:
        '200':
          description: Список всех значений типов раскидок
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LineupTypeValues'
    post:
      summary: Создать новое значение типа раскидки
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LineupTypeValues'
      responses:
        '201':
          description: Значение типа раскидки успешно создано

  /lineup-type-values/{id}:
    get:
      summary: Получить значение типа раскидки по ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Информация о значении типа раскидки
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LineupTypeValues'
    put:
      summary: Полностью обновить значение типа раскидки по ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LineupTypeValues'
      responses:
        '200':
          description: Значение типа раскидки успешно обновлено
    patch:
      summary: Частично обновить значение типа раскидки по ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LineupTypeValuesUpdate'
      responses:
        '200':
          description: Значение типа раскидки частично обновлено
    delete:
      summary: Удалить значение типа раскидки по ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Значение типа раскидки успешно удалено

  /grenade-classes:
    get:
      summary: Получить все классы гранат
      responses:
        '200':
          description: Список всех классов гранат
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GrenadeClass'
    post:
      summary: Создать новый класс гранаты
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GrenadeClass'
      responses:
        '201':
          description: Класс гранаты успешно создан

  /grenade-classes/{id}:
    get:
      summary: Получить класс гранаты по ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Информация о классе гранаты
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GrenadeClass'
    put:
      summary: Полностью обновить класс гранаты по ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GrenadeClass'
      responses:
        '200':
          description: Класс гранаты успешно обновлен
    patch:
      summary: Частично обновить класс гранаты по ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GrenadeClassUpdate'
      responses:
        '200':
          description: Класс гранаты частично обновлен
    delete:
      summary: Удалить класс гранаты по ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Класс гранаты успешно удален

  /users:
    get:
      summary: Получить данные всех пользователей
      responses:
        '200':
          description: Список всех пользователей (только id и username)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
    post:
      summary: Создать нового пользователя
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
      responses:
        '201':
          description: Пользователь успешно создан

  /users/{id}:
    get:
      summary: Получить данные пользователя по ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Информация о пользователе
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
    put:
      summary: Полностью обновить пользователя по ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
      responses:
        '200':
          description: Пользователь успешно обновлен
    patch:
      summary: Частично обновить пользователя по ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
      responses:
        '200':
          description: Пользователь частично обновлен
    delete:
      summary: Удалить пользователя по ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Пользователь успешно удален

  /admins:
    get:
      summary: Получить всех администраторов
      responses:
        '200':
          description: Список всех администраторов
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Admins'
    post:
      summary: Назначить администратора
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Admins'
      responses:
        '201':
          description: Администратор успешно назначен

  /admins/{id}:
    get:
      summary: Получить администратора по ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Информация об администраторе
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Admins'
    patch:
      summary: Частично обновить администратора по ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminsUpdate'
      responses:
        '200':
          description: Администратор частично обновлен
    delete:
      summary: Удалить администратора по ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Администратор успешно удален

  /admin-types:
    get:
      summary: Получить все типы администраторов
      responses:
        '200':
          description: Список всех типов администраторов
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AdminType'
    post:
      summary: Создать новый тип администратора
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminType'
      responses:
        '201':
          description: Тип администратора успешно создан

  /admin-types/{id}:
    get:
      summary: Получить тип администратора по ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Информация о типе администратора
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminType'
    put:
      summary: Полностью обновить тип администратора по ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminType'
      responses:
        '200':
          description: Тип администратора успешно обновлен
    patch:
      summary: Частично обновить тип администратора по ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminTypeUpdate'
      responses:
        '200':
          description: Тип администратора частично обновлен
    delete:
      summary: Удалить тип администратора по ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Тип администратора успешно удален

  /favorites:
    get:
      summary: Получить все избранные раскидки
      responses:
        '200':
          description: Список всех избранных раскидок
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Favorites'
    post:
      summary: Добавить раскидку в избранное
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Favorites'
      responses:
        '201':
          description: Раскидка успешно добавлена в избранное

  /favorites/{userId}:
    get:
      summary: Получить избранные раскидки пользователя
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Список избранных раскидок пользователя
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Favorites'

  /favorites/{userId}/{grenadeId}:
    patch:
      summary: Частично обновить избранную раскидку
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
        - name: grenadeId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FavoritesUpdate'
      responses:
        '200':
          description: Избранная раскидка частично обновлена
    delete:
      summary: Удалить раскидку из избранного
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
        - name: grenadeId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Раскидка успешно удалена из избранного

components:
  schemas:
    Map:
      type: object
      properties:
        map_id:
          type: integer
        name:
          type: string
        link:
          type: string
        image_link:
          type: string

    Lineup:
      type: object
      properties:
        grenade_id:
          type: integer
        map_id:
          type: integer
        grenade_class_id:
          type: integer
        type_id:
          type: integer
        link_to_video:
          type: string
        user_id:
          type: integer
        created_at:
          type: string
          format: date-time
        title:
          type: string
        description:
          type: string
        approved:
          type: boolean
        views:
          type: integer
        preview_image_link:
          type: string

    LineupType:
      type: object
      properties:
        type_id:
          type: integer
        key_name:
          type: string
        value_id:
          type: integer

    LineupTypeValues:
      type: object
      properties:
        value_id:
          type: integer
        value:
          type: string

    GrenadeClass:
      type: object
      properties:
        grenade_class_id:
          type: integer
        name:
          type: string

    User:
      type: object
      properties:
        user_id:
          type: integer
        username:
          type: string
        avatar_url:
          type: string
        steam_link:
          type: string
        tg_id:
          type: integer
        email:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        is_banned:
          type: boolean

    Admins:
      type: object
      properties:
        user_id:
          type: integer
        admin_type_id:
          type: integer

    AdminType:
      type: object
      properties:
        admin_type_id:
          type: integer
        is_superuser:
          type: boolean
        is_base_admin:
          type: boolean
        is_editor:
          type: boolean

    Favorites:
      type: object
      properties:
        user_id:
          type: integer
        grenade_id:
          type: integer
        created_at:
          type: string
          format: date-time

    MapUpdate:
      type: object
      properties:
        name:
          type: string
        link:
          type: string
        image_link:
          type: string

    LineupUpdate:
      type: object
      properties:
        map_id:
          type: integer
        grenade_class_id:
          type: integer
        type_id:
          type: integer
        link_to_video:
          type: string
        user_id:
          type: integer
        title:
          type: string
        description:
          type: string
        approved:
          type: boolean
        views:
          type: integer
        preview_image_link:
          type: string

    LineupTypeUpdate:
      type: object
      properties:
        key_name:
          type: string
        value_id:
          type: integer

    LineupTypeValuesUpdate:
      type: object
      properties:
        value:
          type: string

    GrenadeClassUpdate:
      type: object
      properties:
        name:
          type: string

    UserUpdate:
      type: object
      properties:
        username:
          type: string
        avatar_url:
          type: string
        steam_link:
          type: string
        tg_id:
          type: integer
        email:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        is_banned:
          type: boolean

    AdminsUpdate:
      type: object
      properties:
        admin_type_id:
          type: integer

    AdminTypeUpdate:
      type: object
      properties:
        is_superuser:
          type: boolean
        is_base_admin:
          type: boolean
        is_editor:
          type: boolean

    FavoritesUpdate:
      type: object
      properties:
        created_at:
          type: string
          format: date-time