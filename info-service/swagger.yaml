components:
  schemas:
    Map:
      type: object
      properties:
        map_id:
          type: integer
        name:
          type: string
        link:
          type: string
          nullable: true
        image_link:
          type: string
          nullable: true
        map_lineups:
          type: array
          items:
            $ref: "#/components/schemas/Lineup"

    Lineup:
      type: object
      properties:
        grenade_id:
          type: integer
        map_id:
          type: integer
        link_to_video:
          type: string
          nullable: true
        user_id:
          type: integer
        created_at:
          type: string
          format: date-time
        title:
          type: string
        description:
          type: string
          nullable: true
        is_approved:
          type: boolean
        views:
          type: integer
        preview_image_link:
          type: string
          nullable: true
        is_favorite:
          type: boolean
        property_list:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              value:  
                type: string
        grenade_class:
          $ref: "#/components/schemas/GrenadeClass"

    Property:
      type: object
      properties:
        property_id:
          type: integer
          format: int64
          readOnly: true
        name:
          type: string
        value:
          type: string
    
    PropertyCreate:
      type: object
      properties:
        name:
          type: string
        value:
          type: string
      required:
        - name
    
    PropertyUpdate:
      type: object
      properties:
        name:
          type: string
        value:
          type: string
      minProperties: 1  

    GrenadeClass:
      type: object
      properties:
        grenade_class_id:
          type: integer
          format: int64
          readOnly: true
        name:
          type: string
        description:
          type: string
          nullable: true
        price:
          type: integer
          format: int32
      required:
        - name
        - price

    GrenadeClassCreate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        price:
          type: integer
          format: int32
      required:
        - name
        - price

    GrenadeClassUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        price:
          type: integer
          format: int32
      minProperties: 1

    User:
      type: object
      properties:
        user_id:
          type: integer
        username:
          type: string
        avatar_link:
          type: string
          nullable: true
        steam_link:
          type: string
          nullable: true
        tg_id:
          type: integer
          nullable: true
        email:
          type: string
          nullable: true
        first_name:
          type: string
          nullable: true
        last_name:
          type: string
          nullable: true
        is_banned:
          type: boolean

    Admins:
      type: object
      properties:
        user_info:
          $ref: "#/components/schemas/User"
        admin_info:
          $ref: "#/components/schemas/AdminType"

    AdminType:
      type: object
      properties:
        admin_type_id:
          type: integer
        is_superuser:
          type: boolean
        is_base_admin:
          type: boolean
        is_editor:
          type: boolean

    Favorites:
      type: array
      items:
        $ref: "#/components/schemas/Lineup"

    MapUpdate:
      type: object
      properties:
        name:
          type: string
          nullable: true
        link:
          type: string
          nullable: true
        image_link:
          type: string
          nullable: true

    LineupUpdate:
      type: object
      properties:
        map_id:
          type: integer
        grenade_class_id:
          type: integer
        link_to_video:
          type: string
          nullable: true
        user_id:
          type: integer
        title:
          type: string
        description:
          type: string
          nullable: true
        is_approved:
          type: boolean
        views:
          type: integer
        preview_image_link:
          type: string
          nullable: true

    UserUpdate:
      type: object
      properties:
        username:
          type: string
          nullable: true
        avatar_link:
          type: string
          nullable: true
        steam_link:
          type: string
          nullable: true
        tg_id:
          type: integer
        email:
          type: string
          nullable: true
        first_name:
          type: string
          nullable: true
        last_name:
          type: string
          nullable: true
        is_banned:
          type: boolean

    AdminsUpdate:
      type: object
      properties:
        admin_type_id:
          type: integer

    AdminTypeUpdate:
      type: object
      properties:
        is_superuser:
          type: boolean
        is_base_admin:
          type: boolean
        is_editor:
          type: boolean

    FavoritesUpdate:
      type: object
      properties:
        created_at:
          type: string
          format: date-time

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    basicAuth:
      type: http
      scheme: basic
