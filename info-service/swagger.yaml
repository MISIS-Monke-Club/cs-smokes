openapi: 3.0.3
info:
  title: API for Maps, Lineups, and Users Management
  version: 1.0.0
  description: API for managing maps, lineups, grenade classes, users, admins, and favorites in a tactical game.
servers:
  - url: "http://localhost:3000/api/"
    description: Сервер бекенда, запущенный локально (dev)
  - url: "https://cs-lineups.ru/development/api"
    description: Сервер бекенда, в продакшене
  - url: "http://localhost/development/api"
    description: Сервер бекенда, запущенный локально (prod)

tags:
  - name: AUTH
    description: Авторизация
  - name: Maps
    description: Карты
  - name: Lineups
    description: Раскидки
  - name: Properties
    description: Свойства гранат
  - name: GrenadeClasses
    description: Классы гранат
  - name: Users
    description: Пользователи
  - name: Admins
    description: Администраторы
  - name: Favorites
    description: Избранное

paths:
  /login/:
    post:
      tags:
        - AUTH
      summary: Логин
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: Успешный логин
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/User"
                  access:
                    type: string
                  refresh:
                    type: string
        "401":
          description: Неправильный логин или пароль

  /login/tg/:
    post:
      tags:
        - AUTH
      summary: Логин через тг
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                init_data:
                  type: string
      responses:
        "200":
          description: Успешный логин
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/User"
                  access_token:
                    type: string
                  refresh_token:
                    type: string
        "401":
          description: Что-то пошло не так, попробуйте перезайти
  /register/:
    post:
      tags:
        - AUTH
      summary: Регистрация
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                email:
                  type: string
                password:
                  type: string
      responses:
        "201":
          description: Успешная регистрация
        "400":
          description: Неправильные данные

  /maps/:
    get:
      tags:
        - Maps
      summary: Получить все карты
      security:
        - bearerAuth: []
      parameters:
      - in: query
        name: esports_pool
        schema:
          type: boolean
        description: Фильтр по киберспортивному пулу (актуальные карты Faceit и Premier режима)
        example: true
      - in: query
        name: ordering
        schema:
          type: string
          enum: [popularity, -popularity, by_alphabet, -by_alphabet, lineups_count, -lineups_count]
        description: |
          Поле для сортировки. 
          Префикс "-" для обратного порядка.
          Доступные значения:
          - popularity (по популярности)
          - name (по алфавиту)
          - lineups_count (по количеству раскидок)
        example: popularity
      responses:
        "200":
          description: Список всех карт
          content:
            application/json:
              schema:
                type: object
                properties:
                  map_id:
                    type: integer
                  name:
                    type: string
                  link:
                    type: string
                    nullable: true
                  image_link:
                    type: string
                    nullable: true
    post:
      tags:
        - Maps
      summary: Создать новую карту
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                link:
                  type: string
                  nullable: true
                image_link:
                  type: string
                  nullable: true
      responses:
        "201":
          description: Карта успешно создана
        "401":
          description: Неавторизованный доступ

  /maps/{id}/:
    get:
      tags:
        - Maps
      summary: Получить карту по ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Информация о карте
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Map"
    put:
      tags:
        - Maps
      summary: Полностью обновить карту по ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                link:
                  type: string
                  nullable: true
                image_link:
                  type: string
                  nullable: true
      responses:
        "200":
          description: Карта успешно обновлена
        "401":
          description: Неавторизованный доступ
    patch:
      tags:
        - Maps
      summary: Частично обновить карту по ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                link:
                  type: string
                  nullable: true
                image_link:
                  type: string
                  nullable: true
      responses:
        "200":
          description: Карта частично обновлена
        "401":
          description: Неавторизованный доступ
    delete:
      tags:
        - Maps
      summary: Удалить карту по ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Карта успешно удалена
        "401":
          description: Неавторизованный доступ

  /lineups/:
    get:
      tags:
        - Lineups
      summary: Получить все раскидки
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: is_approved
          schema:
            type: boolean
          description: Фильтр по статусу одобрения (true/false)
          example: true
        - in: query
          name: ordering
          schema:
            type: string
            enum: [date_of_creation, -date_of_creation, by_alphabet, -by_alphabet]
          description: |
            Поле для сортировки. 
            Префикс "-" для обратного порядка.
            Доступные значения: 
            - date_of_creation (по дате создания)
            - by_alphabet (по алфавиту)
          example: date_of_creation
      responses:
        "200":
          description: Список всех раскидок
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Lineup"
    post:
      tags:
        - Lineups
      summary: Создать новую раскидку
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                map_id:
                  type: integer
                link_to_video:
                  type: string
                  nullable: true
                user_id:
                  type: integer
                title:
                  type: string
                description:
                  type: string
                  nullable: true
                approved:
                  type: boolean
                views:
                  type: integer
                preview_image_link:
                  type: string
                  nullable: true
                grenade_class_id:
                  type: integer
      responses:
        "201":
          description: Раскидка успешно создана
        "401":
          description: Неавторизованный доступ

  /lineups/{id}/:
    get:
      tags:
        - Lineups
      summary: Получить раскидку по ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Информация о раскидке
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lineup"
    put:
      tags:
        - Lineups
      summary: Полностью обновить раскидку по ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                map_id:
                  type: integer
                grenade_class_id:
                  type: integer
                link_to_video:
                  type: string
                  nullable: true
                user_id:
                  type: integer
                title:
                  type: string
                description:
                  type: string
                  nullable: true
                approved:
                  type: boolean
                views:
                  type: integer
                preview_image_link:
                  type: string
                  nullable: true
                grenade_class:
                  type: integer

      responses:
        "200":
          description: Раскидка успешно обновлена
        "401":
          description: Неавторизованный доступ
    patch:
      tags:
        - Lineups
      summary: Частично обновить раскидку по ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                map_id:
                  type: integer
                grenade_class_id:
                  type: integer
                link_to_video:
                  type: string
                  nullable: true
                user_id:
                  type: integer
                title:
                  type: string
                description:
                  type: string
                  nullable: true
                approved:
                  type: boolean
                views:
                  type: integer
                preview_image_link:
                  type: string
                  nullable: true
                grenade_class:
                  type: integer

      responses:
        "200":
          description: Раскидка частично обновлена
        "401":
          description: Неавторизованный доступ
    delete:
      tags:
        - Lineups
      summary: Удалить раскидку по ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Раскидка успешно удалена
        "401":
          description: Неавторизованный доступ
  /lineups/{grenade_id}/properties/{property_id}/:
    delete:
      tags:
        - Lineups
      summary: Удалить свойство у раскидки, ручка будет, но принято решение ее не использовать
      security:
        - bearerAuth: []
      parameters:
        - name: grenade_id
          in: path
          required: true
          schema:
            type: integer
          description: ID раскидки
        - name: property_id
          in: path
          required: true
          schema:
            type: integer
          description: ID свойства
      responses:
        "204":
          description: Свойство успешно удалено у раскидки
        "401":
          description: Неавторизованный доступ
        "404":
          description: Раскидка или свойство не найдены

  /lineups/{grenade_id}/properties/:
    post:
      tags:
        - Lineups
      summary: Добавить свойство к раскидке, ручка будет, но принято решение ее не использовать
      security:
        - bearerAuth: []
      parameters:
        - name: grenade_id
          in: path
          required: true
          schema:
            type: integer
          description: ID раскидки
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                property_id:
                  type: integer
                  description: ID добавляемого свойства
              required:
                - property_id
      responses:
        "201":
          description: Свойство успешно добавлено к раскидке
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lineup"
        "400":
          description: Некорректные данные
        "401":
          description: Неавторизованный доступ
        "404":
          description: Раскидка или свойство не найдены

  /lineups/{id}/change-grenade-class/:
    patch:
      tags:
        - Lineups
      summary: Изменить класс гранаты у раскидки
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID раскидки
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                grenade_class_id:
                  type: integer
                  description: ID нового класса гранат
              required:
                - grenade_class_id
      responses:
        "200":
          description: Класс гранаты успешно изменен
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lineup"
        "400":
          description: Некорректные данные
        "401":
          description: Неавторизованный доступ
        "404":
          description: Раскидка или класс гранат не найдены
  /lineups/view_filters/:
    get:
      tags:
        - Lineups
      summary: Получить список всех доступных фильтров
      description: |
        Возвращает фиксированный список всех доступных фильтров.
        Фильтры неизменны и всегда возвращаются в ответе.
      responses:
        200:
          description: Успешный запрос
          content:
            application/json:
              schema:
                type: object
                properties:
                  filters:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                          example: "is_approved"
                          description: "Название фильтра"
                        description:
                          type: string
                          example: "Фильтр по статусу одобрения (true/false)"
                          description: "Описание фильтра"
                example:
                  filters:
                    - name: "is_approved"
                      description: "Фильтр по статусу одобрения (true/false)"
        500:
          description: Внутренняя ошибка сервера

  /lineups/view_sorts/:
    get:
      tags:
        - Lineups
      summary: Получить список всех доступных сортировок
      description: |
        Возвращает фиксированный список всех доступных сортировок.
        Сортировки неизменны и всегда возвращаются в ответе.
      responses:
        200:
          description: Успешный запрос
          content:
            application/json:
              schema:
                type: object
                properties:
                  sorts:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                          example: "date_of_creation"
                          description: "Название сортировки"
                        description:
                          type: string
                          example: "Сортировка по дате создания (от старых к новым)"
                          description: "Описание сортировки"
                example:
                  sorts:
                    - name: "date_of_creation"
                      description: "Сортировка по дате создания (от старых к новым)"
                    - name: "-date_of_creation"
                      description: "Сортировка по дате создания (от новых к старым)"
                    - name: "by_alphabet"
                      description: "Сортировка по алфавиту "
                    - name: "-by_alphabet"
                      description: "Сортировка по алфавиту"
        500:
          description: Внутренняя ошибка сервера

  /properties/:
    get:
      tags:
        - Properties
      summary: Получить все свойства
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Список всех свойств
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Property"
    
    post:
      tags:
        - Properties
      summary: Создать новое свойство
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PropertyCreate"
      responses:
        "201":
          description: Свойство успешно создано
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Property"

  /properties/{id}/:
    get:
      tags:
        - Properties
      summary: Получить свойство по ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Информация о свойстве
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Property"
        "404":
          description: Свойство не найдено
    
    put:
      tags:
        - Properties
      summary: Полностью обновить свойство
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PropertyUpdate"
      responses:
        "200":
          description: Свойство успешно обновлено
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Property"
        "404":
          description: Свойство не найдено
    
    patch:
      tags:
        - Properties
      summary: Частично обновить свойство
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PropertyUpdate"
      responses:
        "200":
          description: Свойство успешно обновлено
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Property"
        "404":
          description: Свойство не найдено
    
    delete:
      tags:
        - Properties
      summary: Удалить свойство
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Свойство успешно удалено
        "404":
          description: Свойство не найдено

  /grenade-classes/:
    get:
      tags:
        - GrenadeClasses
      summary: Получить все классы гранат
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Список всех классов гранат
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GrenadeClass"
    post:
      tags:
        - GrenadeClasses
      summary: Создать новый класс гранаты
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GrenadeClassCreate"
      responses:
        "201":
          description: Класс гранаты успешно создан
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GrenadeClass"
        "401":
          description: Неавторизованный доступ
        "400":
          description: Некорректные данные

  /grenade-classes/{id}/:
    get:
      tags:
        - GrenadeClasses
      summary: Получить данные одного класса гранат по ID
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: ID класса гранат
      responses:
        "200":
          description: Данные класса гранат
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GrenadeClass"
        "404":
          description: Класс гранат не найден
        "401":
          description: Неавторизованный доступ

    put:
      tags:
        - GrenadeClasses
      summary: Обновить класс гранат (полная замена)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: ID класса гранат
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GrenadeClassUpdate"
      responses:
        "200":
          description: Класс гранат успешно обновлен
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GrenadeClass"
        "404":
          description: Класс гранат не найден
        "401":
          description: Неавторизованный доступ
        "400":
          description: Некорректные данные

    patch:
      tags:
        - GrenadeClasses
      summary: Частично обновить класс гранат
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: ID класса гранат
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GrenadeClassUpdate"
      responses:
        "200":
          description: Класс гранат успешно обновлен
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GrenadeClass"
        "404":
          description: Класс гранат не найден
        "401":
          description: Неавторизованный доступ
        "400":
          description: Некорректные данные

    delete:
      tags:
        - GrenadeClasses
      summary: Удалить класс гранат
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: ID класса гранат
      responses:
        "204":
          description: Класс гранат успешно удален
        "404":
          description: Класс гранат не найден
        "401":
          description: Неавторизованный доступ

  /users/:
    get:
      deprecated: true
      tags:
        - Users
      summary: Получить данные всех пользователей
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Список всех пользователей (только id и username)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      deprecated: true
      tags:
        - Users
      summary: Создать нового пользователя
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                avatar_link:
                  type: string
                  nullable: true
                steam_link:
                  type: string
                  nullable: true
                tg_id:
                  type: integer
                  nullable: true
                email:
                  type: string
