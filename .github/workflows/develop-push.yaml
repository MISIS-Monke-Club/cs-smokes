name: Major frontend updates (develop / master push)
on: 
  push:
      branches: 
        - develop
        - main

jobs:
  build:
    name: run actions for big frontend changes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Dependencies
        run: npm install
        working-directory: ./tg-frontend
      - name: Publish tg-frontend to Chromatic
        uses: chromaui/action@latest
        with:
          projectToken: ${{ secrets.CHROMATIC_TG_FRONTEND_TOKEN }}
          workingDir: ./tg-frontend